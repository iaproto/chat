<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chat</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>

@font-face {
      font-family: "fira";
      src: url("fira.otf") format("opentype");
    }

    :root {
      color-scheme: dark;
      --bg: #000;
      --fg: #fff;
      --muted: rgba(255, 255, 255, 0.55);
      --border: #fff;
      --radius: 5px;
    }

    [hidden] {
      display: none !important;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--fg); font-family: 'fira', monospace; }
    body { min-height: 100vh; }
    ::selection { background: var(--fg); color: var(--bg); }
    button, input { font: inherit; }

    .app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
    }

    .login-wrap {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login {
      width: 100%;
      max-width: 240px;
      border: 0px solid #fff;
      border-radius: 5px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .title {
      font-size: 16px;
    }

    .small {
      opacity: 0.55;
      font-size: 12px;
    }

    .label {
      font-size: 12px;
      opacity: 0.75;
      text-transform: lowercase;
    }

    .nameinput,
    .passwordinput,
    .messageinput {
      width: 100%;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      outline: none;
      min-width: 0;
    }

    .nameinput::placeholder,
    .passwordinput::placeholder,
    .messageinput::placeholder { color: rgba(255,255,255,0.38); }

    .button {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--fg);
      color: var(--bg);
      padding: 12px 14px;
      cursor: pointer;
      width: 100%;
    }

    .button:active { transform: translateY(1px); }

    .muted {
      opacity: 0.55;
      font-size: 12px;
      line-height: 1.4;
      min-height: 1.2em;
    }

    .chat-shell {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 72vh;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .drafts {
      padding: 12px;
    }

    .draft {
      opacity: 0.45;
    }

    .draft .time {
      display: none;
    }

    .line {
      display: flex;
      gap: 10px;
      align-items: baseline;
      line-height: 1.5;
      font-size: 14px;
    }

    .time {
      flex: 0 0 auto;
      min-width: 48px;
      opacity: 0.55;
    }

    .name {
      flex: 0 0 auto;
      opacity: 0.9;
    }

    .arrow {
      opacity: 0.7;
    }

    .content {
      flex: 1;
      min-width: 0;
    }

    .composer {
      padding: 16px;
    }

    .composerrow {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .pending {
      opacity: 0.45;
    }

    .meta {
      opacity: 0.55;
      font-size: 12px;
      line-height: 1.4;
      margin-top: 8px;
      min-height: 1.2em;
    }

    .meta:empty {
      display: none;
    }

    .topline {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      align-items: baseline;
      text-transform: lowercase;
      padding: 2px 2px 0;
    }

    .statuswrap {
      display: flex;
      gap: 12px;
      align-items: baseline;
      justify-content: flex-end;
    }

    .room { font-size: 16px; }
    .status { font-size: 12px; opacity: 0.55; }

    .logout {
      border: 0;
      background: transparent;
      color: var(--fg);
      padding: 0;
      margin: 0;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      opacity: 0.55;
      text-transform: lowercase;
    }

    .logout:hover {
      opacity: 0.85;
    }

    .logout:active {
      transform: translateY(1px);
    }

    @media (max-width: 640px) {
      .app { padding: 8px; }
      .composerrow { flex-direction: column; align-items: stretch; }
      .button { width: 100%; }
      .line { flex-wrap: wrap; gap: 6px; }
      .time { min-width: 0; }
      .login { max-width: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="loginWrap" class="login-wrap" hidden>
      <form id="loginForm" class="login">

	<input id="nameInput" class="nameinput" placeholder="username"/>

	<input id="passwordInput" class="passwordinput" type="password" placeholder="password"/>

	<button class="button" type="submit">enter</button>

        <div id="loginError" class="muted"></div>
      </form>
    </div>

    <div id="chatWrap" class="shell" hidden>
      <div class="topline">
        <div class="statuswrap">
          <div class="status" id="status">offline</div>
          <button id="logoutButton" class="logout" type="button">logout</button>
        </div>
      </div>

      <div class="chat-shell">
        <div class="panel">
          <div id="messages" class="messages"></div>
          <div id="drafts" class="drafts"></div>
          <form id="composer" class="composer">
            <div class="composerrow">
              <input id="messageInput" class="messageinput" placeholder="message" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" maxlength="1000" />
            </div>
            <div id="chatMeta" class="meta"></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://naaqxnhsbhvqulqpesbj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_WQ8QfzO06jEsNVqeKLBpoA_Yx5hELAE";

    const db = window.supabase.createClient(
      "https://naaqxnhsbhvqulqpesbj.supabase.co",
      "sb_publishable_WQ8QfzO06jEsNVqeKLBpoA_Yx5hELAE",
    );

    const els = {
      loginWrap: document.getElementById('loginWrap'),
      chatWrap: document.getElementById('chatWrap'),
      loginForm: document.getElementById('loginForm'),
      nameInput: document.getElementById('nameInput'),
      passwordInput: document.getElementById('passwordInput'),
      loginError: document.getElementById('loginError'),
      status: document.getElementById('status'),
      logoutButton: document.getElementById('logoutButton'),
      messages: document.getElementById('messages'),
      drafts: document.getElementById('drafts'),
      composer: document.getElementById('composer'),
      messageInput: document.getElementById('messageInput'),
      chatMeta: document.getElementById('chatMeta'),
    };

    let name = localStorage.getItem('chat_name') || '';
    let password = localStorage.getItem('chat_password') || '';
    let channel = null;
    let presenceChannel = null;
    let typingChannel = null;
    let typingTimer = null;
    let authed = false;
    const clientId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : Math.random().toString(36).slice(2);

    function formatTime(ts) {
      const d = new Date(ts);
      const now = new Date();
      const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
      if (sameDay) {
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      }
      return d.toLocaleDateString([], { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function setStatus(value) {
      els.status.textContent = value;
    }

    function logout() {
      localStorage.removeItem('chat_name');
      name = '';
      els.nameInput.value = '';
      setView(false);
      setStatus('offline');
      els.loginError.textContent = '';
      els.passwordInput.focus();
    }

    function setView(loggedIn) {
      els.loginWrap.hidden = loggedIn;
      els.chatWrap.hidden = !loggedIn;
    }

    function renderLine(msg) {
      const row = document.createElement('div');
      row.className = 'line';
      row.dataset.id = msg.id;

      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(msg.created_at);

      const n = document.createElement('span');
      n.className = 'name';
      n.textContent = msg.name;

      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '>';

      const content = document.createElement('span');
      content.className = 'content';
      content.textContent = msg.content;

      row.append(time, n, arrow, content);
      return row;
    }

    function scrollBottom() {
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function renderDraft(key, sender, content) {
      let row = document.getElementById(`draft-${key}`);

      if (!content) {
        if (row) row.remove();
        return;
      }

      if (!row) {
        row = document.createElement('div');
        row.id = `draft-${key}`;
        row.className = 'line draft';
        els.drafts.appendChild(row);
      }

      row.innerHTML = '';
      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = '';

      const n = document.createElement('span');
      n.className = 'name';
      n.textContent = sender;

      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '>';

      const contentEl = document.createElement('span');
      contentEl.className = 'content';
      contentEl.textContent = content;

      row.append(time, n, arrow, contentEl);
      scrollBottom();
    }

    function clearDraft() {
      renderDraft(clientId, name, '');
      if (typingChannel) {
        typingChannel.send({
          type: 'broadcast',
          event: 'draft',
          payload: { clientId, name, content: '' }
        });
      }
    }

    function sendDraft(content) {
      if (!typingChannel) return;
      typingChannel.send({
        type: 'broadcast',
        event: 'draft',
        payload: {
          clientId,
          name,
          content
        }
      });
    }

    async function loadMessages() {
      if (!db) {
        setStatus('set keys');
        els.chatMeta.textContent = 'add supabase keys';
        return;
      }

      setStatus('loading');
      els.chatMeta.textContent = '';

      const { data, error } = await db
        .from('messages')
        .select('id, name, content, created_at')
        .order('created_at', { ascending: true })
        .order('id', { ascending: true });

      if (error) {
        setStatus('offline');
        els.chatMeta.textContent = error.message;
        return;
      }

      els.messages.innerHTML = '';
      (data || []).forEach((msg) => els.messages.appendChild(renderLine(msg)));
      setStatus('online');
      scrollBottom();
    }

    function subscribe() {
      if (!db) return;
      if (channel) db.removeChannel(channel);
      if (presenceChannel) db.removeChannel(presenceChannel);
      if (typingChannel) db.removeChannel(typingChannel);

    channel = db
      .channel('room:main')
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'messages' },
        (payload) => {
          const exists = Array.from(els.messages.children).some(
            (node) => node.dataset.id === String(payload.new.id)
          );

          if (exists) return;

          const pending = els.messages.querySelector('.pending');

          if (
            pending &&
            payload.new.name === name &&
            pending.querySelector('.content')?.textContent === payload.new.content
          ) {
            pending.remove();
          }

          els.messages.appendChild(renderLine(payload.new));
          scrollBottom();
        }
      )
      .subscribe();

      presenceChannel = db.channel('presence:main', {
        config: {
          presence: { key: clientId }
        }
      });

      presenceChannel.on('presence', { event: 'sync' }, () => {
        const state = presenceChannel.presenceState();
        const count = Object.keys(state).length;
        setStatus(count > 1 ? 'online' : 'offline');
      });

      presenceChannel.subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
          await presenceChannel.track({ online: true, name, clientId });
        }
      });

      typingChannel = db.channel('typing:main');

      typingChannel.on('broadcast', { event: 'draft' }, ({ payload }) => {
        if (!payload || payload.clientId === clientId) return;
        renderDraft(payload.clientId, payload.name || 'user', payload.content || '');
      });

      typingChannel.subscribe();
    }

    async function verifyPassword(inputPassword) {
      if (!db) throw new Error('supabase not set');

      const { data, error } = await db
        .from('room_access')
        .select('password')
        .limit(1)
        .single();

      if (error) throw error;
      return data && data.password === inputPassword;
    }

    async function enterChat() {
      const nextName = els.nameInput.value.trim();
      const nextPassword = els.passwordInput.value;

      if (!nextName || !nextPassword) {
        els.loginError.textContent = 'missing';
        return;
      }

      if (!db) {
        els.loginError.textContent = 'add supabase keys';
        return;
      }

      els.loginError.textContent = '';
      els.loginForm.querySelector('button').textContent = '...';

      try {
        const ok = await verifyPassword(nextPassword);
        if (!ok) {
          els.loginError.textContent = 'invalid';
          els.loginForm.querySelector('button').textContent = 'enter';
          return;
        }

        name = nextName;
        password = nextPassword;
        localStorage.setItem('chat_name', name);
        localStorage.setItem('chat_password', password);

        authed = true;
        setView(true);
        setStatus('loading');
        await loadMessages();
        subscribe();
        setTimeout(() => els.messageInput.focus(), 0);
      } catch (err) {
        els.loginError.textContent = err?.message || 'error';
      } finally {
        els.loginForm.querySelector('button').textContent = 'enter';
      }
    }

    els.loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      enterChat();
    });

    els.logoutButton.addEventListener('click', () => {
      logout();
    });

    els.composer.addEventListener('submit', async (e) => {
      e.preventDefault();

      const content = els.messageInput.value.trim();
      if (!content || !name || !db) return;

      clearDraft();
      els.messageInput.value = '';

      const pending = renderPendingMessage(content);

      const { error } = await db
        .from('messages')
        .insert({ name, content });

      if (error) {
        pending.remove();
        els.chatMeta.textContent = error.message;
        els.messageInput.value = content;
      }
    });

    els.messageInput.addEventListener('input', () => {
      clearTimeout(typingTimer);

      const content = els.messageInput.value.trim();
      if (!content) {
        clearDraft();
        return;
      }

      renderDraft(clientId, name, content);

      typingTimer = setTimeout(() => {
        sendDraft(els.messageInput.value.trim());
      }, 120);
    });

    els.messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        els.composer.requestSubmit();
      }
    });

    async function boot() {
      els.nameInput.value = name;
      els.passwordInput.value = password;

      if (name && password && db) {
        try {
          const ok = await verifyPassword(password);
          if (ok) {
            authed = true;
            setView(true);
            setStatus('loading');
            await loadMessages();
            subscribe();
            return;
          }
        } catch (_) {
          // fall through to login
        }
      }

      setView(false);
      setStatus(db ? 'ready' : 'set keys');
      els.nameInput.focus();
    }

    function renderPendingMessage(content) {
      const row = document.createElement('div');

      row.className = 'line pending';
      row.dataset.pending = 'true';

      const time = document.createElement('span');
      time.className = 'time';
      time.textContent = formatTime(new Date());

      const n = document.createElement('span');
      n.className = 'name';
      n.textContent = name;

      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '>';

      const text = document.createElement('span');
      text.className = 'content';
      text.textContent = content;

      row.append(time, n, arrow, text);

      els.messages.appendChild(row);
      scrollBottom();

      return row;
    }

    boot();
  </script>
</body>
</html>
